[pytest]
filterwarnings =
    error
    ignore: numpy.ndarray size changed, may indicate binary incompatibility. *:RuntimeWarning
    ignore: 'where' used without 'out', expect unitialized memory in output. If this is intentional, use out=None.
    ignore: function 'mod' is not known to astropy's Quantity. *
    ignore: invalid value encountered in divide
    ignore: 'mode' parameter is deprecated and will be removed
    ignore: More than 20 figures have been opened.

[coverage:report]
exclude_also =
    return NotImplemented
    raise ValueError
    raise NotImplementedError
